<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co-Op Campaign | Theo & Jess</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #0f172a);
        }

        .dashboard {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 3rem 4rem;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #334155;
        }

        h1 {
            font-size: 1rem;
            letter-spacing: 4px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 3rem;
            font-weight: 500;
        }

        .players {
            display: flex;
            gap: 3rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .player-card {
            background: #0f172a;
            padding: 2.5rem;
            border-radius: 12px;
            min-width: 200px;
            border: 1px solid #334155;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .player-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        /* Player 1 Accent */
        .player-card:nth-child(1)::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
        }

        /* Player 2 Accent */
        .player-card:nth-child(2)::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #ec4899;
            box-shadow: 0 0 15px #ec4899;
        }

        .name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .status {
            font-size: 0.85rem;
            color: #10b981;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .time {
            font-size: 2.5rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            color: #ffffff;
        }

        .label {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Active Co-Op Campaign</h1>
        <div class="players">
            <div class="player-card">
                <div class="name">Theo</div>
                <div class="status">Connected</div>
                <div class="time" id="theo-time">--:--</div>
                <div class="label">Local Time</div>
            </div>

            <div class="player-card">
                <div class="name">Jess</div>
                <div class="status">Connected</div>
                <div class="time" id="jess-time">--:--</div>
                <div class="label">Local Time</div>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            
            const timeOptions = { hour: '2-digit', minute: '2-digit' };
            
            // Update Theo's Time (Current Local Time)
            document.getElementById('theo-time').innerText = now.toLocaleTimeString([], timeOptions);
            
            // Update Jess's Time (11 hours behind)
            // 7:15 PM to 8:15 AM is exactly an 11-hour difference.
            const jessDate = new Date(now.getTime() - (11 * 60 * 60 * 1000));
            document.getElementById('jess-time').innerText = jessDate.toLocaleTimeString([], timeOptions);
        }
        
        // Initialize and update every second to keep the colon blinking/accurate
        setInterval(updateTime, 1000);
        updateTime();
    </script>

</body>
</html>
