<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signal Lost</title>
    <link rel="icon" type="image/png" href="delta.png">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Press+Start+2P&display=swap"
        rel="stylesheet">

    <style>
        body {
            background-color: #000;
            color: #333;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
            user-select: none;
            transition: background-color 1s ease;
        }

        /* --- STATIC NOISE EFFECT --- */
        .scanline {
            width: 100%;
            height: 100%;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0,0,0,0) 50%, rgba(50, 50, 50, 0.1) 50%);
            opacity: 0.1;
            background-size: 100% 4px;
            position: absolute;
            pointer-events: none;
            animation: scanline 10s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 3rem;
            color: #ff0000;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #300;
            animation: glitch 1s infinite;
            transition: color 1s ease, text-shadow 1s ease;
        }

        .subtitle {
            font-family: 'Press Start 2P';
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 50px;
            letter-spacing: 2px;
            line-height: 2;
            transition: color 1s ease;
        }

        .status-box {
            border: 1px solid #333;
            padding: 20px 40px;
            color: #444;
            font-family: monospace;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 1s ease;
        }

        .blink {
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }

        .final-msg {
            margin-top: 100px;
            font-size: 0.7rem;
            color: #222;
        }

        /* --- COMFORT PROTOCOL UI --- */
        #comfort-btn {
            background: transparent;
            border: 1px solid #222;
            color: #444;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            padding: 12px 24px;
            cursor: pointer;
            margin-top: 40px;
            transition: all 0.3s;
            position: relative;
            z-index: 20;
        }

        #comfort-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>

<body>

    <div class="scanline"></div>

    <h1 id="main-title">OFFLINE</h1>

    <div class="subtitle" id="sub-title">
        SIGNAL TO JESS LOST<br>
        CONNECTION SEVERED
    </div>

    <div class="status-box" id="status-box">
        CO-OP CAMPAIGN ENDED: THEO & JESS
    </div>

    <button id="comfort-btn">INITIATE COMFORT PROTOCOL</button>

    <div class="subtitle" id="lower-sub" style="margin-top: 50px; color: #888;">
        IT'S OVER.
    </div>

    <div class="final-msg" id="final-msg">
        SERVER SHUTDOWN COMPLETE<br>
        <span class="blink">_</span>
    </div>

    <script>
        // Clear any lingering data or legacy themes from local storage
        localStorage.clear();

        // Comfort Protocol Logic (Standalone - all other theme switches removed)
        document.getElementById('comfort-btn').addEventListener('click', function() {
            // Soften the environment
            document.body.style.backgroundColor = '#0f172a';
            
            // Adjust Typography & Animations
            const title = document.getElementById('main-title');
            title.style.color = '#3b82f6';
            title.style.textShadow = '2px 2px 0px #001';
            title.style.animation = 'none';
            title.innerText = 'STANDBY';

            // Update Messaging
            document.getElementById('sub-title').innerHTML = 'SYSTEM RESTING<br>AWAITING JESS';
            document.getElementById('sub-title').style.color = '#94a3b8';
            
            const statusBox = document.getElementById('status-box');
            statusBox.innerText = 'COMFORT PROTOCOL ENGAGED';
            statusBox.style.borderColor = '#3b82f6';
            statusBox.style.color = '#3b82f6';
            statusBox.style.boxShadow = '0 0 15px rgba(59, 130, 246, 0.1)';

            document.getElementById('lower-sub').innerText = 'TAKE A DEEP BREATH.';
            document.getElementById('lower-sub').style.color = '#64748b';

            document.getElementById('final-msg').innerHTML = 'SYSTEM HIBERNATING SECURELY<br><span class="blink">_</span>';
            document.getElementById('final-msg').style.color = '#475569';

            // Hide the button after activation
            this.style.display = 'none';
        });
    </script>
</body>

</html>
